upstream dride_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Rate limit zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=api_webhook:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 443 ssl http2;
    server_name api.dride.app;

    # SSL/TLS Hardening
    ssl_certificate /etc/letsencrypt/live/api.dride.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dride.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Connection limits
    limit_conn addr 100;

    # Request body size limit
    client_max_body_size 256k;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Block common exploit paths
    location ~ /\. { deny all; }
    location ~ \.php$ { deny all; }
    location ~ /\.env { deny all; }

    # Auth endpoints — strict rate limiting
    location ~ ^/api/auth/(login|register) {
        limit_req zone=api_auth burst=3 nodelay;
        proxy_pass http://dride_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # Webhook endpoint
    location = /api/paymob/webhook {
        limit_req zone=api_webhook burst=10 nodelay;
        proxy_pass http://dride_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
    }

    # General API
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass http://dride_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.dride.app;
    return 301 https://$host$request_uri;
}
