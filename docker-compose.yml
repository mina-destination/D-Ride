version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dride_postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=dride
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d dride"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dride_api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://root:secret@postgres:5432/dride?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
    restart: unless-stopped

  client-app:
    build:
      context: .
      dockerfile: apps/client-app/Dockerfile
    container_name: dride_client_app
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

  admin-dashboard:
    build:
      context: .
      dockerfile: apps/admin-dashboard/Dockerfile
    container_name: dride_admin_dashboard
    ports:
      - "5174:80"
    depends_on:
      - api
    restart: unless-stopped

  driver-portal:
    build:
      context: .
      dockerfile: apps/driver-portal/Dockerfile
    container_name: dride_driver_portal
    ports:
      - "5175:80"
    depends_on:
      - api
    restart: unless-stopped


volumes:
  postgres_data:

