version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: dride_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret
      - MONGO_INITDB_DATABASE=dride
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: dride_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dride_api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://root:secret@mongodb:27017/dride?authSource=admin
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
    restart: unless-stopped

  client-app:
    build:
      context: .
      dockerfile: apps/client-app/Dockerfile
    container_name: dride_client_app
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

  admin-dashboard:
    build:
      context: .
      dockerfile: apps/admin-dashboard/Dockerfile
    container_name: dride_admin_dashboard
    ports:
      - "5174:80"
    depends_on:
      - api
    restart: unless-stopped

  driver-portal:
    build:
      context: .
      dockerfile: apps/driver-portal/Dockerfile
    container_name: dride_driver_portal
    ports:
      - "5175:80"
    depends_on:
      - api
    restart: unless-stopped


volumes:
  mongodb_data:
  redis_data:
