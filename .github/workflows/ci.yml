name: CI Pipeline

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint codebase
        run: npm run lint

      - name: Push database schema
        run: npx prisma db push --schema=apps/api/prisma/schema.prisma --accept-data-loss --force-reset
        env:
          DATABASE_URL: ${{ coalesce(secrets.DATABASE_URL, 'postgresql://localhost:5432/dride_test') }}

      - name: Run tests
        run: npm run test

      - name: Build projects
        run: npm run build
